services:
  backend:
    build: ./backend
    container_name: wechat-ai-editor
    ports:
      - "8000:8000"
    volumes:
      - data_volume:/app/data
      - uploads_volume:/app/uploads
    environment:
      - LLM_API_BASE=${LLM_API_BASE:-http://8.145.39.17:8080/v1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-glm-5.1-w8a8}
      - WECHAT_APP_ID=${WECHAT_APP_ID}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://wechat-ai-editor-hjh.vercel.app}
      - SQLITE_DB_PATH=/app/data/wechat_editor.db
      - ASSETS_DIR=/app/assets
      - UPLOAD_DIR=/app/uploads
    restart: unless-stopped

volumes:
  data_volume:
  uploads_volume:
