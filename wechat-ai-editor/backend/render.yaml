services:
  - type: web
    name: wechat-ai-editor-backend
    runtime: python
    runtimeVersion: "3.12"
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      # Copy assets from source if available
      if [ -d "../原始素材" ]; then cp -r ../原始素材/* ./assets/ 2>/dev/null; fi
    startCommand: python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: LLM_API_BASE
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL_NAME
        sync: false
      - key: WECHAT_APP_ID
        sync: false
      - key: WECHAT_APP_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SQLITE_DB_PATH
        value: /opt/render/project/src/data/wechat_editor.db
      - key: ASSETS_DIR
        value: /opt/render/project/src/assets
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
