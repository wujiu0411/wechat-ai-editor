services:
  - type: web
    name: wechat-ai-editor-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_API_BASE
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL_NAME
        sync: false
      - key: WECHAT_APP_ID
        sync: false
      - key: WECHAT_APP_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
